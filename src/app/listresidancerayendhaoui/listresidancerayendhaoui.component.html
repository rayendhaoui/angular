<h2>Liste des résidences</h2>
<div *ngIf="loading">Chargement...</div>
<div *ngIf="error" class="error">{{ error }}</div>
<table *ngIf="!loading && residences.length">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nom</th>
      <th>Adresse</th>
      <th>Statut</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let r of residences">
      <td>{{ r.id }}</td>
      <td>{{ r.name }}</td>
      <td>{{ r.address }}</td>
      <td>{{ r.status }}</td>
      <td>
        <button (click)="viewDetail(r.id)">Détails</button>
        <button (click)="delete(r.id)">Supprimer</button>
      </td>
    </tr>
  </tbody>
</table>
<div *ngIf="!loading && residences.length === 0">
  Aucune résidence trouvée.
</div>
<button (click)="router.navigate(['/add'])">Ajouter une résidence</button>
